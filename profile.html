<div class="container form-container">
    <div class="card">
        <div class="card-header bg-danger text-white text-center py-3">
            <h4 id="page-title">Complete Your Profile</h4>
        </div>
        <div class="card-body p-4">
            <form id="profile-form">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Height (cm)</label>
                        <input type="number" id="height" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" id="weight" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Age</label>
                        <input type="number" id="age" class="form-control" required>
                    </div>
                </div>

                <div class="row g-3 mt-2">
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select id="gender" class="form-select" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3 mt-3">
                    <label class="form-label">Fitness Goals</label>
                    <textarea id="goals" class="form-control" rows="3" placeholder="e.g. Lose 10kg, Build muscle..."></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Health Issues / Injuries</label>
                    <textarea id="healthIssues" class="form-control" rows="3" placeholder="Any medical conditions, previous injuries..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">Dietary Restrictions / Preferences</label>
                    <textarea id="dietary" class="form-control" rows="3" placeholder="Vegetarian, allergies, etc."></textarea>
                </div>

                <div class="d-grid">
                    <button type="button" onclick="saveProfile()" id="save-btn" class="btn btn-danger btn-lg">Save / Update Profile</button>
                </div>
            </form>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="dashboard.html" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD01C6Flcgy_so_EvWNTINttczzoexJPck",
        authDomain: "dagi-aman-gym.firebaseapp.com",
        projectId: "dagi-aman-gym",
        storageBucket: "dagi-aman-gym.firebasestorage.app",
        messagingSenderId: "193829259951",
        appId: "1:193829259951:web:64cc23ec8499006519e25a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserId = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "auth/login.html?redirect=" + encodeURIComponent(window.location.pathname);
            return;
        }

        currentUserId = user.uid;

        const profileRef = doc(db, "clientProfiles", user.uid);
        const profileSnap = await getDoc(profileRef);

        if (profileSnap.exists()) {
            const data = profileSnap.data();
            document.getElementById("page-title").textContent = "Update Your Profile";

            document.getElementById("fullName").value = data.fullName || "";
            document.getElementById("height").value = data.height || "";
            document.getElementById("weight").value = data.weight || "";
            document.getElementById("age").value = data.age || "";
            document.getElementById("gender").value = data.gender || "";
            document.getElementById("goals").value = data.goals || "";
            document.getElementById("healthIssues").value = data.healthIssues || "";
            document.getElementById("dietary").value = data.dietary || "";
        }
    });

    async function saveProfile() {
        if (!currentUserId) return alert("Please log in again");

        const profileData = {
            fullName: document.getElementById("fullName").value.trim(),
            height: parseFloat(document.getElementById("height").value) || 0,
            weight: parseFloat(document.getElementById("weight").value) || 0,
            age: parseInt(document.getElementById("age").value) || 0,
            gender: document.getElementById("gender").value,
            goals: document.getElementById("goals").value.trim(),
            healthIssues: document.getElementById("healthIssues").value.trim(),
            dietary: document.getElementById("dietary").value.trim(),
            updatedAt: new Date().toISOString(),
            clientId: currentUserId
        };

        try {
            await setDoc(doc(db, "clientProfiles", currentUserId), profileData, { merge: true });
            alert("Profile updated successfully!");
            window.location.href = "dashboard.html";
        } catch (e) {
            console.error(e);
            alert("Error saving profile. Please try again.");
        }
    }

    window.saveProfile = saveProfile;
</script>
