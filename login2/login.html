<!DOCTYPE html>
<html lang="en">
<head>
    <title>Responsive login</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <script type="module" src="login.js" defer></script>

</head>
<body>
    <section>
        <div class="image">
            <img src="bgimg.png" alt="background image">
            </div>
            <div class="content">
                <div class="form">
                    <h2>Login</h2>
                    <form>
                        <div class="input">
                            <span>Email</span>
                            <input type="email" placeholder="Your Email" id="email" required>
                        </div>
                        <div class="input">
                            <span>Password</span>
                            <input type="password" placeholder="Your Password" id="password" required>
                        </div>
                        <div class="input">
                            <input type="submit" value="Submit" id="submit">
                        </div>

                        <div class="input">
                            <p><a href="forgot.html">Forgot your password?</a></p>
                        </div>
                        <div class="input">
                            <p>Don't have an account? <a href="register.html">Sign up</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </section>

    </body>
</html>
