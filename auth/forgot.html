<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <script type="module" src="forgot.js" defer></script>

</head>
<body>
    <section>
        <div class="image">
            <img src="bgimg.png" alt="background image" loading="lazy">
        </div>
        <div class="content">
            <div class="form">
                <h2>Reset Password</h2>
                <form>
                    <div class="input">
                        <span>Email</span>
                        <input type="email" placeholder="Your Email" id="email" required>
                    </div>
                    <div class="input">
                        <input type="submit" value="Send Reset Link" id="submit">
                    </div>
                    <div class="input">
                        <p>Remembered your password? <a href="login.html">Sign in</a></p>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
