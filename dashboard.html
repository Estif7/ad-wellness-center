<div class="container py-5">
    <div class="welcome-card card shadow mb-4">
        <div class="card-body text-center py-4">

    <h3 class="mb-4">Your Personalized Content</h3>
    <div id="content-list" class="row">
        <div class="col-12 text-center py-5" id="loading">

            <button onclick="sendMessage()" class="btn btn-danger">Send</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD01C6Flcgy_so_EvWNTINttczzoexJPck",
        authDomain: "dagi-aman-gym.firebaseapp.com",
        projectId: "dagi-aman-gym",
        storageBucket: "dagi-aman-gym.firebasestorage.app",
        messagingSenderId: "193829259951",
        appId: "1:193829259951:web:64cc23ec8499006519e25a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserId = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "login2/login.html";
            return;
        }

        currentUserId = user.uid;

        // Try to get name from profile
        let displayName = user.email.split('@')[0];
        try {
            const profileSnap = await getDoc(doc(db, "clientProfiles", user.uid));
            if (profileSnap.exists() && profileSnap.data().fullName) {
                displayName = profileSnap.data().fullName;
            }
        } catch (e) {}

        document.getElementById("user-name").textContent = displayName;

        loadPersonalizedContent();
        loadMessages();
    });

    async function loadPersonalizedContent() {
        const container = document.getElementById("content-list");
        container.innerHTML = `<div class="col-12 text-center py-5"><div class="spinner-border text-danger"></div><p class="mt-3">Loading your content...</p></div>`;

        try {
            const q = query(collection(db, "personalizedContent"), where("clientId", "==", currentUserId));
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                container.innerHTML = `<div class="col-12 alert alert-info text-center">No personalized content assigned yet.</div>`;
                return;
            }

            container.innerHTML = "";

            snapshot.forEach(docSnap => {
                const item = docSnap.data();
                const isImage = item.mediaUrl && /\.(jpg|jpeg|png|gif|webp)$/i.test(item.mediaUrl);

                const html = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">${item.title}</h5>
                                ${item.description ? `<p class="card-text small text-muted">${item.description}</p>` : ''}
                                
                                ${isImage && item.mediaUrl ? `
                                    <img src="${item.mediaUrl}" class="img-fluid rounded mb-3 content-card" onclick="zoomImage('${item.mediaUrl}')" style="cursor:pointer;">
                                ` : item.mediaUrl ? `
                                    <div class="ratio ratio-16x9 mb-3">
                                        <iframe src="${convertYouTubeUrl(item.mediaUrl)}" allowfullscreen></iframe>
                                    </div>
                                ` : ''}

                                ${item.content ? `<p class="small">${item.content}</p>` : ''}
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += html;
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="col-12 alert alert-warning">Error loading content.</div>`;
        }
    }

    function convertYouTubeUrl(url) {
        if (!url) return "";
        if (url.includes("youtu.be")) return `https://www.youtube.com/embed/${url.split("youtu.be/")[1].split("?")[0]}`;
        if (url.includes("youtube.com/watch")) {
            const v = new URL(url).searchParams.get("v");
            return `https://www.youtube.com/embed/${v}`;
        }
        return url;
    }

    function zoomImage(url) {
        const modalHTML = `
            <div class="modal fade" id="imageZoomModal" tabindex="-1">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content">
                        <div class="modal-header"><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body text-center p-0">
                            <img src="${url}" style="max-width:100%; max-height:90vh; object-fit:contain;">
                        </div>
                    </div>
                </div>
            </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        new bootstrap.Modal(document.getElementById("imageZoomModal")).show();
        document.getElementById("imageZoomModal").addEventListener('hidden.bs.modal', () => this.remove());
    }

    function loadMessages() {
        const chatBox = document.getElementById("chat-box");
        const q = query(
            collection(db, "messages"),
            where("clientId", "==", currentUserId),
            orderBy("timestamp", "asc")
        );

        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = "";
            if (snapshot.empty) {
                chatBox.innerHTML = `<p class="text-muted text-center">No messages yet. Send one below!</p>`;
                return;
            }

            snapshot.forEach(docSnap => {
                const msg = docSnap.data();
                const isClient = msg.from === "client";

                const div = document.createElement("div");
                div.className = `mb-3 ${isClient ? 'text-end' : 'text-start'}`;
                div.innerHTML = `
                    <div class="${isClient ? 'bg-danger text-white' : 'bg-light'} p-3 rounded-3 d-inline-block" style="max-width: 80%;">
                        <small class="opacity-75">${msg.from === "client" ? "You" : "Trainer"}</small><br>
                        ${msg.message}
                        <br><small class="opacity-50">${new Date(msg.timestamp).toLocaleString()}</small>
                    </div>`;
                chatBox.appendChild(div);
            });

            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    async function sendMessage() {
        const input = document.getElementById("message-input");
        const text = input.value.trim();
        if (!text || !currentUserId) return;

        try {
            await addDoc(collection(db, "messages"), {
                clientId: currentUserId,
                clientEmail: auth.currentUser.email,
                message: text,
                from: "client",
                timestamp: new Date().toISOString(),
                read: false
            });

            input.value = "";
        } catch (e) {
            alert("Failed to send message");
            console.error(e);
        }
    }

    window.sendMessage = sendMessage;
    window.zoomImage = zoomImage;

    // Enter key support
    document.getElementById("message-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
